<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test OMNI Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Test Authentification OMNI</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Téléphone</label>
                <input type="tel" id="phone" placeholder="+22812345678" 
                       class="w-full p-3 border rounded-lg">
            </div>
            
            <button onclick="testSendOTP()" 
                    class="w-full bg-emerald-600 text-white p-3 rounded-lg hover:bg-emerald-700">
                Envoyer OTP
            </button>
            
            <div>
                <label class="block text-sm font-medium mb-2">Code OTP</label>
                <input type="text" id="otp" placeholder="123456" 
                       class="w-full p-3 border rounded-lg">
            </div>
            
            <button onclick="testVerifyOTP()" 
                    class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">
                Vérifier OTP
            </button>
        </div>
        
        <div id="result" class="mt-6 p-4 rounded-lg"></div>
    </div>

    <script>
        async function testSendOTP() {
            const phone = document.getElementById('phone').value;
            const result = await fetch('/api/auth/send-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone})
            });
            const data = await result.json();
            showResult(data);
        }
        
        async function testVerifyOTP() {
            const phone = document.getElementById('phone').value;
            const otp = document.getElementById('otp').value;
            const result = await fetch('/api/auth/verify-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone, otp})
            });
            const data = await result.json();
            showResult(data);
            if (data.success) {
                localStorage.setItem('omni_user', JSON.stringify(data.user));
            }
        }
        
        function showResult(data) {
            const div = document.getElementById('result');
            div.className = data.success ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
            div.innerHTML = `
                <strong>${data.success ? '✅ Succès' : '❌ Erreur'}</strong><br>
                ${data.message || data.error}
            `;
        }
    </script>
</body>
</html>
